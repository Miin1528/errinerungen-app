<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14161f" id="themeColorMeta">
<title>Meine Erinnerungen</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="brand"><span class="logo">⏰</span>Meine Erinnerungen</div>
  <div class="clock" id="clock">--:--</div>
</header>

<main id="main">

  <!-- Ansicht: Erinnerungen -->
  <section class="view active" data-view="liste">
    <p class="greeting" id="greeting"></p>

    <div class="banner" id="dueBanner">
      <h3>🔔 Jetzt fällig!</h3>
      <div id="dueList"></div>
    </div>

    <div class="card" id="templatesCard" hidden>
      <h2>⚡ Blitz-Termine <span class="sub">(gelernt – 1 Klick genügt)</span></h2>
      <div class="chips" id="templateChips"></div>
    </div>

    <input type="search" id="suchFeld" class="suchfeld" placeholder="🔍 Erinnerungen durchsuchen …" autocomplete="off">
    <div class="chips katfilter" id="katFilter"></div>

    <div class="tabs" id="tabs">
      <button data-filter="offen" class="active">Offen</button>
      <button data-filter="erledigt">Erledigt</button>
      <button data-filter="alle">Alle</button>
    </div>
    <ul class="reminders" id="reminderList"></ul>
  </section>

  <!-- Ansicht: Kalender -->
  <section class="view" data-view="kalender">
    <div class="tabs" id="kalModusTabs">
      <button data-modus="privat" class="active">📅 Mein Kalender</button>
      <button data-modus="arbeit">💼 Arbeits-Kalender</button>
    </div>
    <div class="kalkopf">
      <button class="small" id="kalZurueck" aria-label="Voriger Monat">‹</button>
      <h2 class="viewtitle" id="kalTitel" style="margin:0"></h2>
      <button class="small" id="kalVor" aria-label="Nächster Monat">›</button>
    </div>
    <div class="kalgrid" id="kalGrid"></div>
    <h3 class="kaltag-titel" id="kalTagTitel"></h3>
    <ul class="reminders" id="kalTagListe"></ul>
  </section>

  <!-- Ansicht: Profil / Gelerntes -->
  <section class="view" data-view="profil">
    <h2 class="viewtitle">🧠 Was ich über dich gelernt habe</h2>
    <div class="stats" id="statsGrid"></div>
    <p class="hint" id="learnHint"></p>
  </section>

  <!-- Ansicht: Einstellungen -->
  <section class="view" data-view="einstellungen">
    <h2 class="viewtitle">⚙️ Einstellungen</h2>

    <div class="card group">
      <h2>Allgemein</h2>
      <div class="setting-row">
        <label for="setName">Dein Name <span class="sub">(für die Begrüßung)</span></label>
        <input type="text" id="setName" placeholder="z. B. Anna" autocomplete="off">
      </div>
      <div class="setting-row">
        <label for="setTheme">Design</label>
        <select id="setTheme">
          <option value="system">Wie System</option>
          <option value="dunkel">Dunkel</option>
          <option value="hell">Hell</option>
        </select>
      </div>
    </div>

    <div class="card group">
      <h2>Erinnern</h2>
      <div class="setting-row">
        <label for="reRemind">Erneut erinnern nach <span class="sub">(Minuten, mind. 120 = 2 Std.)</span></label>
        <input type="number" id="reRemind" min="120" step="10">
      </div>
      <div class="setting-row">
        <label for="notifToggle">Benachrichtigungen</label>
        <label class="switch"><input type="checkbox" id="notifToggle"><span></span></label>
      </div>
      <div class="setting-row">
        <label for="soundToggle">Ton</label>
        <label class="switch"><input type="checkbox" id="soundToggle"><span></span></label>
      </div>
      <div class="setting-row">
        <label for="vibrToggle">Vibration</label>
        <label class="switch"><input type="checkbox" id="vibrToggle"><span></span></label>
      </div>
      <button id="testNotif">🔔 Test-Benachrichtigung senden</button>
    </div>

    <div class="card group">
      <h2>App &amp; Daten</h2>
      <div class="setting-row">
        <label>Als App installieren</label>
        <button id="installBtn" hidden>📲 Installieren</button>
      </div>
      <p class="hint" id="installHint"></p>
      <div class="setting-row">
        <label for="pushUrl">Push-Server-URL <span class="sub">(optional – für Push bei geschlossener App)</span></label>
        <input type="url" id="pushUrl" placeholder="https://…" autocomplete="off">
      </div>
      <div class="btnrow">
        <button id="exportBtn">⬇️ Daten exportieren</button>
        <button id="importBtn">⬆️ Daten importieren</button>
        <input type="file" id="importFile" accept="application/json" hidden>
      </div>
      <div class="setting-row">
        <label>Alle Erinnerungen und alles Gelernte löschen</label>
        <button class="danger" id="resetBtn">Zurücksetzen</button>
      </div>
    </div>

    <p class="hint">Alle Daten bleiben privat auf deinem Gerät gespeichert.</p>
  </section>

</main>

<button class="fab" id="fabBtn" aria-label="Neue Erinnerung anlegen">+</button>

<nav class="bottomnav">
  <button class="navbtn active" data-view="liste"><span class="ico">📋</span>Liste</button>
  <button class="navbtn" data-view="kalender"><span class="ico">📅</span>Kalender</button>
  <button class="navbtn" data-view="profil"><span class="ico">🧠</span>Profil</button>
  <button class="navbtn" data-view="einstellungen"><span class="ico">⚙️</span>Einstellungen</button>
</nav>

<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Neue Erinnerung">
  <div class="grip" aria-hidden="true"></div>
  <h2 id="sheetTitel">✏️ Neue Erinnerung</h2>
  <div class="inputrow">
    <input type="text" id="newText" list="suggestions" placeholder="Was soll ich mir merken?" autocomplete="off">
    <button id="micBtn" class="mic" hidden aria-label="Erinnerung diktieren">🎤</button>
  </div>
  <datalist id="suggestions"></datalist>
  <div class="inputrow">
    <input type="datetime-local" id="newTime">
    <select id="newRepeat" aria-label="Wiederholung">
      <option value="">Einmalig</option>
      <option value="taeglich">🔁 Täglich</option>
      <option value="woechentlich">🔁 Wöchentlich</option>
      <option value="monatlich">🔁 Monatlich</option>
    </select>
  </div>
  <div class="chips" id="katChips"></div>
  <div class="chips" id="quickTimes"></div>
  <button class="primary big" id="addBtn">Speichern 💾</button>
</div>

<div id="toast" role="status"></div>

<script src="js/storage.js"></script>
<script src="js/learning.js"></script>
<script src="js/notify.js"></script>
<script src="js/ui.js"></script>
<script src="js/kalender.js"></script>
<script src="js/app.js"></script>
</body>
</html>
